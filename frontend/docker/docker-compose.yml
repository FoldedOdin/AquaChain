version: '3.8'

services:
  aquachain-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aquachain-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aquachain-frontend.rule=Host(`aquachain.local`)"
      - "traefik.http.routers.aquachain-frontend.entrypoints=web"
      - "traefik.http.services.aquachain-frontend.loadbalancer.server.port=80"

  # Optional: Add a reverse proxy
  traefik:
    image: traefik:v2.10
    container_name: aquachain-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

networks:
  default:
    name: aquachain-network