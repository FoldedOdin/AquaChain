name: AquaChain CDK Deployment

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/cdk/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/cdk/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
          - diff

env:
  AWS_DEFAULT_REGION: us-east-1
  CDK_DEFAULT_REGION: us-east-1

jobs:
  test:
    name: Test CDK Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install CDK CLI
        run: npm install -g aws-cdk
      
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('infrastructure/cdk/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Python dependencies
        working-directory: infrastructure/cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Python linting
        working-directory: infrastructure/cdk
        run: |
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .
      
      - name: Run CDK unit tests
        working-directory: infrastructure/cdk
        run: |
          python -m pytest tests/ -v --tb=short
      
      - name: CDK Synth (Dev)
        working-directory: infrastructure/cdk
        run: |
          cdk synth --context environment=dev
      
      - name: CDK Synth (Staging)
        working-directory: infrastructure/cdk
        run: |
          cdk synth --context environment=staging
      
      - name: CDK Synth (Prod)
        working-directory: infrastructure/cdk
        run: |
          cdk synth --context environment=prod

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: development
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install CDK CLI
        run: npm install -g aws-cdk
      
      - name: Install Python dependencies
        working-directory: infrastructure/cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      
      - name: CDK Bootstrap
        working-directory: infrastructure/cdk
        run: |
          cdk bootstrap --context environment=dev
      
      - name: CDK Deploy
        working-directory: infrastructure/cdk
        run: |
          python deployment/deploy.py --environment dev --action deploy --auto-approve
      
      - name: Validate Deployment
        working-directory: infrastructure/cdk
        run: |
          python validation/validate_infrastructure.py --environment dev --output validation-results-dev.json
      
      - name: Upload validation results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: validation-results-dev
          path: infrastructure/cdk/validation-results-dev.json

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install CDK CLI
        run: npm install -g aws-cdk
      
      - name: Install Python dependencies
        working-directory: infrastructure/cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      
      - name: CDK Bootstrap
        working-directory: infrastructure/cdk
        run: |
          cdk bootstrap --context environment=staging
      
      - name: CDK Deploy
        working-directory: infrastructure/cdk
        run: |
          python deployment/deploy.py --environment staging --action deploy --auto-approve
      
      - name: Validate Deployment
        working-directory: infrastructure/cdk
        run: |
          python validation/validate_infrastructure.py --environment staging --output validation-results-staging.json
      
      - name: Upload validation results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: validation-results-staging
          path: infrastructure/cdk/validation-results-staging.json

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install CDK CLI
        run: npm install -g aws-cdk
      
      - name: Install Python dependencies
        working-directory: infrastructure/cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      
      - name: CDK Bootstrap
        working-directory: infrastructure/cdk
        run: |
          cdk bootstrap --context environment=prod
      
      - name: CDK Diff
        working-directory: infrastructure/cdk
        run: |
          python deployment/deploy.py --environment prod --action diff
      
      - name: CDK Deploy
        working-directory: infrastructure/cdk
        run: |
          python deployment/deploy.py --environment prod --action deploy
      
      - name: Validate Deployment
        working-directory: infrastructure/cdk
        run: |
          python validation/validate_infrastructure.py --environment prod --output validation-results-prod.json
      
      - name: Upload validation results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: validation-results-prod
          path: infrastructure/cdk/validation-results-prod.json
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Production deployment completed successfully!"
          # Add notification logic here (Slack, email, etc.)

  manual-action:
    name: Manual Action
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'prod'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install CDK CLI
        run: npm install -g aws-cdk
      
      - name: Install Python dependencies
        working-directory: infrastructure/cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure AWS credentials (Dev)
        if: github.event.inputs.environment == 'dev'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      
      - name: Configure AWS credentials (Staging)
        if: github.event.inputs.environment == 'staging'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      
      - name: Execute manual action
        working-directory: infrastructure/cdk
        run: |
          python deployment/deploy.py \
            --environment ${{ github.event.inputs.environment }} \
            --action ${{ github.event.inputs.action }} \
            --auto-approve

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/cdk
          framework: cloudformation
          output_format: sarif
          output_file_path: checkov-results.sarif
      
      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: checkov-results.sarif
      
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r infrastructure/cdk -f json -o bandit-results.json || true
      
      - name: Upload security scan results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-scan-results
          path: |
            checkov-results.sarif
            bandit-results.json