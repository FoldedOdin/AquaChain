technician_service:
  runtime: python3.11
  handler: handler.lambda_handler
  timeout: 30
  memory: 512
  reserved_concurrency: 50
  environment:
    USERS_TABLE: aquachain-users
    SERVICE_REQUESTS_TABLE: aquachain-service-requests
    LOCATION_MAP_NAME: aquachain-map
    LOCATION_ROUTE_CALCULATOR: aquachain-routes
    LOCATION_PLACE_INDEX: aquachain-places
    ADMIN_TOPIC_ARN: !Ref AdminNotificationTopic
    NOTIFICATION_TOPIC_ARN: !Ref ServiceNotificationTopic
    WEBSOCKET_API_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  
  iam_policies:
    - Version: '2012-10-17'
      Statement:
        # DynamoDB permissions
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt UsersTable.Arn
            - !GetAtt ServiceRequestsTable.Arn
            - !Sub "${UsersTable.Arn}/index/*"
            - !Sub "${ServiceRequestsTable.Arn}/index/*"
        
        # AWS Location Service permissions
        - Effect: Allow
          Action:
            - geo:CalculateRoute
            - geo:SearchPlaceIndexForText
            - geo:SearchPlaceIndexForPosition
            - geo:GetGeofence
            - geo:ListGeofences
            - geo:PutGeofence
          Resource:
            - !Sub "arn:aws:geo:${AWS::Region}:${AWS::AccountId}:route-calculator/aquachain-routes"
            - !Sub "arn:aws:geo:${AWS::Region}:${AWS::AccountId}:place-index/aquachain-places"
            - !Sub "arn:aws:geo:${AWS::Region}:${AWS::AccountId}:geofence-collection/aquachain-service-zones"
        
        # Map access for visualization
        - Effect: Allow
          Action:
            - geo:GetMap*
          Resource:
            - !Sub "arn:aws:geo:${AWS::Region}:${AWS::AccountId}:map/aquachain-map"
        
        # SNS permissions for notifications
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - !Ref AdminNotificationTopic
            - !Ref ServiceNotificationTopic
        
        # API Gateway Management permissions for WebSocket
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
  
  api_gateway_events:
    - http:
        path: /api/v1/service-requests
        method: post
        cors: true
        authorizer:
          name: CognitoAuthorizer
          type: COGNITO_USER_POOLS
          arn: !GetAtt UserPool.Arn
    
    - http:
        path: /api/v1/service-requests/{requestId}
        method: get
        cors: true
        authorizer:
          name: CognitoAuthorizer
          type: COGNITO_USER_POOLS
          arn: !GetAtt UserPool.Arn
    
    - http:
        path: /api/v1/service-requests/{requestId}/status
        method: put
        cors: true
        authorizer:
          name: CognitoAuthorizer
          type: COGNITO_USER_POOLS
          arn: !GetAtt UserPool.Arn
    
    - http:
        path: /api/v1/technicians/available
        method: get
        cors: true
        authorizer:
          name: CognitoAuthorizer
          type: COGNITO_USER_POOLS
          arn: !GetAtt UserPool.Arn
    
    - http:
        path: /api/v1/technicians/{technicianId}/availability
        method: put
        cors: true
        authorizer:
          name: CognitoAuthorizer
          type: COGNITO_USER_POOLS
          arn: !GetAtt UserPool.Arn
    
    - http:
        path: /api/v1/technicians/{technicianId}/schedule
        method: put
        cors: true
        authorizer:
          name: CognitoAuthorizer
          type: COGNITO_USER_POOLS
          arn: !GetAtt UserPool.Arn

  layers:
    - !Ref CommonUtilsLayer  # Common utilities and boto3

  tags:
    Project: AquaChain
    Service: TechnicianService
    Environment: production