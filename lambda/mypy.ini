[mypy]
# Global mypy configuration for AquaChain Lambda functions
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_calls = False
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_optional = True
show_error_codes = True
show_column_numbers = True

# Allow gradual typing adoption
disallow_any_generics = False
disallow_subclassing_any = False

# Third-party libraries without type stubs
[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-jsonschema.*]
ignore_missing_imports = True

[mypy-xray_utils.*]
ignore_missing_imports = True

[mypy-infrastructure.*]
ignore_missing_imports = True

# Per-module configuration
[mypy-lambda.data_processing.handler]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-lambda.auth_service.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-lambda.ml_inference.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-lambda.user_management.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-lambda.technician_service.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-lambda.notification_service.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
