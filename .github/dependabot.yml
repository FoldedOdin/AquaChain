      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: increase
    groups:
      aws-dependencies:
        patterns:
          - "boto3"
          - "aws-*"
        update-types:
          - "minor"
          - "patch"

