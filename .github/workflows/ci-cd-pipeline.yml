
name: AquaChain CI/CD Pipeline

# ------------------------------------------------------------------------------
# Flow:  code-quality + security-scan (parallel)
#          +-► frontend-tests + lambda-tests + infra-validate (parallel)
#                +-► integration-tests
#                      +-► build-package
#                            +-► deploy-staging  (develop branch)
#                                  +-► deploy-production  (main branch)
#                                        +-► rollback  (on failure)
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # STAGE 1a – Code Quality
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: TypeScript strict check
        run: cd frontend && npx tsc --noEmit --strict

      - name: Prettier format check
        run: cd frontend && npm run format:check

      - name: Install Python quality tools
        run: pip install black flake8 mypy boto3-stubs[essential] types-requests

      - name: Black format check
        run: black --check lambda/ --exclude '/(\.git|__pycache__|\.mypy_cache)/'

      - name: Flake8 lint
        run: flake8 lambda/ --max-line-length=120 --exclude=__pycache__,.mypy_cache

      - name: mypy – shared modules
        run: |
          cd lambda
          pip install -q -r shared/requirements.txt 2>/dev/null || true
          mypy shared/ --config-file=../config/mypy.ini --ignore-missing-imports

      - name: mypy – Lambda handlers
        run: |
          cd lambda
          for dir in */; do
            [ -f "${dir}handler.py" ] || continue
            pip install -q -r "${dir}requirements.txt" 2>/dev/null || true
            mypy "${dir}" --config-file=../config/mypy.ini --ignore-missing-imports || exit 1
          done

  # ============================================
  # STAGE 1b – Security Scan (parallel with 1a)
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-results.sarif

      - name: Ensure Trivy SARIF exists
        if: always()
        run: |
          [ -f trivy-results.sarif ] || echo '{"version":"2.1.0","runs":[]}' > trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Semgrep SAST
        continue-on-error: true
        run: |
          pip install --upgrade semgrep
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif --output semgrep-results.sarif || true
          [ -f semgrep-results.sarif ] || echo '{"version":"2.1.0","runs":[]}' > semgrep-results.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: npm audit – critical gate
        run: |
          cd frontend && npm ci --prefer-offline
          npm audit --json > npm-audit.json || true
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
          echo "Critical npm vulnerabilities: $CRITICAL"
          [ "$CRITICAL" -eq 0 ] || { echo "❌ Critical npm vulnerabilities found"; exit 1; }

      - name: pip-audit Lambda deps
        run: |
          pip install pip-audit
          for req in lambda/*/requirements.txt; do
            echo "Auditing $req"
            pip-audit --requirement "$req" --skip-editable || exit 1
          done

  # ============================================
  # STAGE 2a – Frontend Tests
  # ============================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests with coverage
        run: npm test -- --coverage --watchAll=false --ci

      - name: Enforce 80% coverage threshold
        run: |
          node -e "
          const s = require('./coverage/coverage-summary.json').total;
          const t = 80;
          const fail = ['lines','statements','functions','branches'].filter(k => s[k].pct < t);
          if (fail.length) {
            fail.forEach(k => console.error('❌ ' + k + ': ' + s[k].pct + '% < ' + t + '%'));
            process.exit(1);
          }
          console.log('✅ Coverage thresholds met');
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ============================================
  # STAGE 2b – Lambda Tests (matrix, parallel)
  # ============================================
  lambda-tests:
    name: Lambda Tests – ${{ matrix.function }}
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan]
    strategy:
      fail-fast: false
      matrix:
        function:
          - data_processing
          - ml_inference
          - alert_detection
          - notification_service
          - auth_service
          - user_management
          - technician_service
          - ledger_service
          - audit_trail_processor
          - gdpr_service
          - compliance_service
          - api_gateway
          - websocket_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.function }}-${{ hashFiles(format('lambda/{0}/requirements.txt', matrix.function)) }}

      - name: Install deps
        run: |
          cd lambda/${{ matrix.function }}
          [ -f requirements.txt ] && pip install -r requirements.txt
          pip install pytest pytest-cov moto[all] boto3 freezegun

      - name: Run tests
        run: |
          cd lambda/${{ matrix.function }}
          if compgen -G "test_*.py" > /dev/null || [ -d tests ]; then
            python -m pytest -v \
              --cov=. \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              --cov-fail-under=80 \
              --tb=short
          else
            echo "⚠️  No tests found for ${{ matrix.function }} – skipping"
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: lambda/${{ matrix.function }}/coverage.xml
          flags: lambda-${{ matrix.function }}
          fail_ci_if_error: false

  # ============================================
  # STAGE 2c – Infrastructure Validate
  # ============================================
  infra-validate:
    name: Infrastructure Validate
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install CDK + deps
        run: |
          npm install -g aws-cdk@2
          cd infrastructure
          pip install -r requirements.txt

      - name: CDK synth (dry-run, no AWS creds needed)
        run: |
          cd infrastructure/cdk
          cdk synth --all --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Validate GDPR / compliance files exist
        run: |
          required=(
            "lambda/shared/audit_logger.py"
            "lambda/shared/data_encryption_service.py"
            "lambda/shared/data_classification.py"
            "lambda/shared/consent_checker.py"
            "lambda/gdpr_service/data_export_service.py"
            "lambda/gdpr_service/data_deletion_service.py"
            "lambda/gdpr_service/consent_service.py"
          )
          fail=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then echo "❌ Missing: $f"; fail=1
            else echo "✅ $f"; fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Validate audit logging in critical Lambdas
        run: |
          for svc in auth_service user_management gdpr_service compliance_service; do
            if ! grep -rq "audit_logger" "lambda/$svc/" 2>/dev/null; then
              echo "❌ No audit_logger usage in lambda/$svc"
              exit 1
            fi
            echo "✅ audit_logger found in $svc"
          done

  # ============================================
  # STAGE 3 – Integration Tests (LocalStack)
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests, lambda-tests, infra-validate]
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,s3,sns,sqs,iot,lambda,apigateway,secretsmanager
          DEBUG: "0"
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test deps
        run: pip install boto3 pytest requests localstack-client moto[all]

      - name: Wait for LocalStack
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:4566/_localstack/health | grep -q "\"dynamodb\": \"available\""; do sleep 3; done'

      - name: Run integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          LOCALSTACK_ENDPOINT: http://localhost:4566
        run: python -m pytest tests/integration/ -v --tb=short --timeout=120

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: tests/integration/reports/
          retention-days: 7

  # ============================================
  # STAGE 4 – Build & Package
  # Only runs after ALL tests pass, on main/develop
  # ============================================
  build-package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set build metadata
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG:0:8}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TAG=${TAG:0:8}" >> "$GITHUB_ENV"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          REACT_APP_VERSION=${{ env.BUILD_TAG }} npm run build

      - name: Package Lambda functions
        run: |
          mkdir -p dist/lambda
          for dir in lambda/*/; do
            [ -f "${dir}handler.py" ] || continue
            name=$(basename "$dir")
            echo "Packaging $name …"
            cd "$dir"
            [ -f requirements.txt ] && pip install -q -r requirements.txt -t . --upgrade
            zip -qr "../../dist/lambda/${name}.zip" . \
              -x "*.pyc" -x "__pycache__/*" -x "tests/*" -x "test_*.py" -x "*.md"
            cd - > /dev/null
          done

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ env.BUILD_TAG }}
          path: frontend/build/
          retention-days: 30

      - name: Upload Lambda packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages-${{ env.BUILD_TAG }}
          path: dist/lambda/
          retention-days: 30

  # ============================================
  # STAGE 5 – Deploy to Staging
  # Runs on develop branch (or manual dispatch)
  # ============================================
  deploy-staging:
    name: Deploy – Staging
    runs-on: ubuntu-latest
    needs: [build-package]
    if: |
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.aquachain.example.com
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@v4
        with:
          name: lambda-packages-${{ needs.build-package.outputs.image-tag }}
          path: dist/lambda/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ needs.build-package.outputs.image-tag }}
          path: frontend/build/

      - name: Deploy Lambda functions to staging
        run: |
          for zip in dist/lambda/*.zip; do
            name=$(basename "$zip" .zip)
            fn="AquaChain-Function-${name}-staging"
            echo "Deploying $fn …"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file "fileb://$zip" \
              --region ${{ env.AWS_REGION }} || echo "⚠️  $fn not found – skipping"
            aws lambda wait function-updated \
              --function-name "$fn" \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

      - name: Deploy frontend to S3 (staging)
        run: |
          aws s3 sync frontend/build/ \
            s3://aquachain-frontend-staging-${{ secrets.AWS_ACCOUNT_ID }}/ \
            --delete --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/build/index.html \
            s3://aquachain-frontend-staging-${{ secrets.AWS_ACCOUNT_ID }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_STAGING }} \
            --paths "/*"

      - name: Smoke tests – staging
        run: |
          pip install requests
          python tests/smoke/staging_smoke_tests.py
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}

  # ============================================
  # STAGE 6 – Deploy to Production (Blue/Green)
  # Runs on main branch only, after staging passes
  # ============================================
  deploy-production:
    name: Deploy – Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://app.aquachain.example.com
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRODUCTION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@v4
        with:
          name: lambda-packages-${{ needs.build-package.outputs.image-tag }}
          path: dist/lambda/
        # build-package is an ancestor; its output is available via needs chain

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ needs.build-package.outputs.image-tag }}
          path: frontend/build/

      - name: Blue/Green – deploy GREEN Lambda versions
        id: green-deploy
        run: |
          for zip in dist/lambda/*.zip; do
            name=$(basename "$zip" .zip)
            fn="AquaChain-Function-${name}-production"
            echo "Updating $fn …"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file "fileb://$zip" \
              --region ${{ env.AWS_REGION }} || { echo "⚠️  $fn not found"; continue; }
            aws lambda wait function-updated \
              --function-name "$fn" --region ${{ env.AWS_REGION }}
            VERSION=$(aws lambda publish-version \
              --function-name "$fn" \
              --description "deploy-${{ github.sha }}" \
              --region ${{ env.AWS_REGION }} \
              --query 'Version' --output text)
            aws lambda update-alias \
              --function-name "$fn" --name GREEN \
              --function-version "$VERSION" \
              --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws lambda create-alias \
              --function-name "$fn" --name GREEN \
              --function-version "$VERSION" \
              --region ${{ env.AWS_REGION }}
            echo "GREEN_${name}=$VERSION" >> "$GITHUB_ENV"
          done

      - name: Deploy frontend to GREEN S3 bucket
        run: |
          aws s3 sync frontend/build/ \
            s3://aquachain-frontend-green-${{ secrets.AWS_ACCOUNT_ID }}/ \
            --delete

      - name: Production validation tests (GREEN)
        run: |
          pip install requests
          ENVIRONMENT=green python tests/smoke/production_validation_tests.py
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}

      - name: Switch LIVE aliases to GREEN
        run: |
          for zip in dist/lambda/*.zip; do
            name=$(basename "$zip" .zip)
            fn="AquaChain-Function-${name}-production"
            green_ver="${GREEN_${name}}"
            [ -z "$green_ver" ] && continue
            aws lambda update-alias \
              --function-name "$fn" --name LIVE \
              --function-version "$green_ver" \
              --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws lambda create-alias \
              --function-name "$fn" --name LIVE \
              --function-version "$green_ver" \
              --region ${{ env.AWS_REGION }}
          done

      - name: Promote GREEN frontend to production
        run: |
          aws s3 sync \
            s3://aquachain-frontend-green-${{ secrets.AWS_ACCOUNT_ID }}/ \
            s3://aquachain-frontend-production-${{ secrets.AWS_ACCOUNT_ID }}/ \
            --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PRODUCTION }} \
            --paths "/*"

      - name: Post-deploy smoke test (LIVE)
        run: |
          sleep 30
          ENVIRONMENT=production python tests/smoke/production_validation_tests.py
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}

      - name: Notify Slack – success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "✅ AquaChain production deploy succeeded – `${{ github.sha }}`"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # STAGE 7 – Automatic Rollback on failure
  # ============================================
  rollback-production:
    name: Rollback – Production
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRODUCTION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Revert LIVE aliases to BLUE
        run: |
          functions=(
            data_processing ml_inference alert_detection notification_service
            auth_service user_management technician_service ledger_service
            audit_trail_processor gdpr_service compliance_service
            api_gateway websocket_api
          )
          for name in "${functions[@]}"; do
            fn="AquaChain-Function-${name}-production"
            BLUE=$(aws lambda get-alias \
              --function-name "$fn" --name BLUE \
              --region ${{ env.AWS_REGION }} \
              --query 'FunctionVersion' --output text 2>/dev/null) || continue
            aws lambda update-alias \
              --function-name "$fn" --name LIVE \
              --function-version "$BLUE" \
              --region ${{ env.AWS_REGION }}
            echo "↩️  Rolled back $fn to BLUE ($BLUE)"
          done

      - name: Revert frontend to BLUE bucket
        run: |
          aws s3 sync \
            s3://aquachain-frontend-blue-${{ secrets.AWS_ACCOUNT_ID }}/ \
            s3://aquachain-frontend-production-${{ secrets.AWS_ACCOUNT_ID }}/ \
            --delete || echo "No blue backup found"
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PRODUCTION }} \
            --paths "/*"

      - name: Notify Slack – rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "🚨 Production deploy FAILED and was rolled back. SHA: `${{ github.sha }}`"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
